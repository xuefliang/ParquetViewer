name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore src/ParquetViewer.sln

    - name: Build (Debug)
      run: dotnet build src/ParquetViewer.sln --configuration Debug --no-restore

    - name: Test
      run: dotnet test src/ParquetViewer.sln --no-build --logger trx

    - name: Publish (Release)
      run: dotnet publish src/ParquetViewer/ParquetViewer.csproj --configuration Release --output publish/Release -r win-x64 --no-self-contained

    - name: Publish (Release_SelfContained)
      run: dotnet publish src/ParquetViewer/ParquetViewer.csproj --configuration Release_SelfContained --output publish/Release_SelfContained -r win-x64 --self-contained

    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      with:
        name: ParquetViewer-Release
        path: publish/Release/ParquetViewer.exe

    - name: Upload SelfContained artifact
      uses: actions/upload-artifact@v4
      with:
        name: ParquetViewer-SelfContained
        path: publish/Release_SelfContained/ParquetViewer.exe
