name: Build ParquetViewer

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release, Release_SelfContained]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore src/ParquetViewer.sln

    - name: Build
      run: dotnet build src/ParquetViewer.sln --configuration ${{ matrix.configuration }} --no-restore

    - name: Publish
      run: dotnet publish src/ParquetViewer/ParquetViewer.csproj --configuration ${{ matrix.configuration }} --output publish/${{ matrix.configuration }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ParquetViewer-${{ matrix.configuration }}
        path: publish/${{ matrix.configuration }}/
